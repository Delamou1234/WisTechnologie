services:
  db:
    image: postgres:16-alpine
    container_name: wistech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-wistech}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wistech}
      POSTGRES_DB: ${DB_NAME:-wistech}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - wistech_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wistech} -d ${DB_NAME:-wistech}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wistech_db_data:
